name: review_app
description: "Application d'analyse des avis clients multi-plateformes"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2

  # Network
  http: ^1.1.0
  
  # Charts & Visualisation
  fl_chart: ^0.69.0
  
  # Export
  pdf: ^3.11.1
  printing: ^5.13.3
  csv: ^6.0.0
  
  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true